        function escapeHtml(text) {
            return String(text)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;");
        }

        /** Three sheets — pages 1–2 capped at 31 rows (62 members) so nothing spills; page 3 takes the rest. */
        function chunkMembersForPrint(list) {
            const pageSizes = [62, 62];
            const chunks = [];
            let index = 0;

            for (const size of pageSizes) {
                chunks.push(list.slice(index, index + size));
                index += size;
            }

            chunks.push(list.slice(index));
            return chunks;
        }

        function buildTableRows(pageMembers) {
            const half = Math.ceil(pageMembers.length / 2);
            let rowsHtml = "";

            for (let i = 0; i < half; i++) {
                const left = pageMembers[i];
                const right = pageMembers[i + half];

                rowsHtml += `
                    <tr>
                        <td class="col-sl">${left.sl}</td>
                        <td class="col-name">${escapeHtml(left.name)}</td>
                        <td class="col-mobile">${escapeHtml(left.mobile)}</td>
                        <td class="col-sl divider">${right ? right.sl : ""}</td>
                        <td class="col-name">${right ? escapeHtml(right.name) : ""}</td>
                        <td class="col-mobile">${right ? escapeHtml(right.mobile) : ""}</td>
                    </tr>
                `;
            }

            return rowsHtml;
        }

        function renderPages() {
            const pagesRoot = document.getElementById("pages");

            pageChunks.forEach((pageMembers, pageIndex) => {

                const pageNumber = pageIndex + 1;
